<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Etch a Sketch</title>
</head>
<body>
        <div class="green-board">
            <div class="top-container">
                <h3>Magic</h3>
                <h1>Etch a Sketch</h1>
                <h3>Board</h3>
            </div>
            <div class="sketch-board"></div>
            <div class="color-buttons">
                <button class="black-btn">Black</button>
                <button class="gray-btn">Gray</button>
                <button class="random-btn">Random</button>
                <button class="erase-btn">Erase</button>
                <button class="reset-btn">Reset</button>
            </div>
            <div class="property-container">
                <input type="text" class="size-input" placeholder="Enter a value between 2 and 100">
                <button class="resize">Resize</button>
            </div>
        </div>
    
    
</body>
</html>
